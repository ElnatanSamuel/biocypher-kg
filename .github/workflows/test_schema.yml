name: Test Adapters Against Schema

on:
  push:
    branches: [ "main" ]
        paths:
          - 'biocypher_metta/adapters/**'
          - 'config/adapters_config_sample.yaml'
          - 'test/test.py'
  pull_request:
    branches: [ "main" ]
        paths:
          - 'biocypher_metta/adapters/**'
          - 'config/adapters_config_sample.yaml'
          - 'test/test.py'
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.x" # Specify the Python version you need

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r test/requirements.txt

      - name: Run tests
        run: |
          pytest test/test.py --adapters-config=./config/adapters_config_sample.yaml --dbsnp-rsids=./aux_files/sample_dbsnp_rsids.pkl --dbsnp-pos=./aux_files/sample_dbsnp_pos.pkl -v
