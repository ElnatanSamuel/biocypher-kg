name: Test Adapters Against Schema

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.x" # Specify the Python version you need

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r test/requirements.txt  # Ensure you have a requirements file with necessary packages

      - name: Run tests
        run: |
          pytest test/test.py --adapters-config=test/schema_config.yaml --dbsnp-rsids=test/dbsnp_rsids.pkl --dbsnp-pos=test/dbsnp_pos.pkl
